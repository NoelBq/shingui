<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Shingi · Brand & UI</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; background: #0a0c12; }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="brand/logos.jsx"></script>
<script type="text/babel" src="brand/banners.jsx"></script>
<script type="text/babel" src="brand/ui.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

function App() {
  return (
    <DesignCanvas
      title="Shingi — brand & UI"
      subtitle="Logo, banners, and refreshed app UI · graph mark · no kanji"
    >
      {/* ── Brand foundation ─────────────────────────────────────────── */}
      <DCSection id="logos" title="Logo system">
        <DCArtboard id="primary" label="01 · primary lockup"
          width={520} height={420}>
          <LogoPrimary />
        </DCArtboard>
        <DCArtboard id="horizontal" label="02 · horizontal"
          width={620} height={300}>
          <LogoHorizontal />
        </DCArtboard>
        <DCArtboard id="inline" label="03 · inline · header"
          width={420} height={220}>
          <LogoInline />
        </DCArtboard>
        <DCArtboard id="mark" label="04 · app icon"
          width={320} height={320}>
          <LogoMark />
        </DCArtboard>
        <DCArtboard id="animated" label="09 · animated · live"
          width={420} height={320}>
          <LogoAnimated />
        </DCArtboard>
      </DCSection>

      <DCSection id="logo-variants" title="Color & background variants">
        <DCArtboard id="on-light" label="on light" width={520} height={320}>
          <LogoOnLight />
        </DCArtboard>
        <DCArtboard id="mono-green" label="mono · accent" width={520} height={320}>
          <LogoMonoGreen />
        </DCArtboard>
        <DCArtboard id="mono-white" label="mono · white" width={520} height={320}>
          <LogoMonoWhite />
        </DCArtboard>
        <DCArtboard id="roundel" label="roundel · sticker" width={320} height={320}>
          <LogoRoundel />
        </DCArtboard>
      </DCSection>

      {/* ── Banners ──────────────────────────────────────────────────── */}
      <DCSection id="banners" title="Banners & social">
        <DCArtboard id="github" label="GitHub README · 1280×640"
          width={1280} height={640}>
          <BannerGitHub />
        </DCArtboard>
        <DCArtboard id="twitter" label="X / Twitter header · 1500×500"
          width={1500} height={500}>
          <BannerTwitter />
        </DCArtboard>
        <DCArtboard id="og" label="Open Graph · 1200×630"
          width={1200} height={630}>
          <BannerOG />
        </DCArtboard>
      </DCSection>

      {/* ── App UI ───────────────────────────────────────────────────── */}
      <DCSection id="ui" title="Refreshed app UI">
        <DCArtboard id="hero" label="Landing · hero" width={1440} height={820}>
          <HeroRefreshed />
        </DCArtboard>
        <DCArtboard id="memory-list" label="Memory list · table"
          width={1440} height={720}>
          <MemoryList />
        </DCArtboard>
        <DCArtboard id="verify" label="Verify page · tampered state"
          width={1440} height={820}>
          <VerifyPage />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
