<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Shingi README banner</title>
  <desc id="desc">Dark banner with the Shingi graph mark, headline, and a Solana devnet status pill.</desc>
  <defs>
    <radialGradient id="glow-green" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(260 120) rotate(36) scale(520 360)">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.26" />
      <stop offset="1" stop-color="#34d399" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-violet" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1090 540) rotate(-24) scale(420 300)">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.2" />
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1" />
    </pattern>
    <filter id="soft-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="#07080c" />
  <rect width="1280" height="640" fill="url(#grid)" />
  <rect width="1280" height="640" fill="url(#glow-green)" />
  <rect width="1280" height="640" fill="url(#glow-violet)" />

  <g transform="translate(80 76)">
    <g transform="translate(0 2)">
      <line x1="8" y1="10" x2="56" y2="10" stroke="#34d399" stroke-opacity="0.75" stroke-width="2" stroke-linecap="round" stroke-dasharray="5 4" />
      <line x1="8" y1="10" x2="8" y2="35" stroke="#a78bfa" stroke-opacity="0.65" stroke-width="1.6" stroke-linecap="round" stroke-dasharray="3 3" />
      <line x1="20" y1="10" x2="20" y2="35" stroke="#a78bfa" stroke-opacity="0.65" stroke-width="1.6" stroke-linecap="round" stroke-dasharray="3 3" />
      <line x1="32" y1="10" x2="32" y2="35" stroke="#a78bfa" stroke-opacity="0.65" stroke-width="1.6" stroke-linecap="round" stroke-dasharray="3 3" />
      <line x1="44" y1="10" x2="44" y2="35" stroke="#a78bfa" stroke-opacity="0.65" stroke-width="1.6" stroke-linecap="round" stroke-dasharray="3 3" />
      <line x1="56" y1="10" x2="56" y2="35" stroke="#a78bfa" stroke-opacity="0.65" stroke-width="1.6" stroke-linecap="round" stroke-dasharray="3 3" />
      <circle cx="8" cy="10" r="3.2" fill="#34d399" />
      <circle cx="20" cy="10" r="3.2" fill="#34d399" />
      <circle cx="32" cy="10" r="3.2" fill="#34d399" />
      <circle cx="44" cy="10" r="3.2" fill="#34d399" />
      <circle cx="56" cy="10" r="3.2" fill="#34d399" />
      <rect x="5" y="35" width="6" height="6" fill="#a78bfa" rx="0.8" />
      <rect x="17" y="35" width="6" height="6" fill="#a78bfa" rx="0.8" />
      <rect x="29" y="35" width="6" height="6" fill="#a78bfa" rx="0.8" />
      <rect x="41" y="35" width="6" height="6" fill="#a78bfa" rx="0.8" />
      <rect x="53" y="35" width="6" height="6" fill="#a78bfa" rx="0.8" />
    </g>
    <text x="80" y="28" fill="#e7e9ee" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="600" letter-spacing="0.16em">shingi</text>
  </g>

  <g transform="translate(1070 74)">
    <rect width="130" height="34" rx="17" fill="#0d1018" fill-opacity="0.78" stroke="#1f2433" />
    <circle cx="18" cy="17" r="4" fill="#34d399" />
    <text x="30" y="21" fill="#8b91a3" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="11" font-weight="500" letter-spacing="0.14em">SOLANA / DEVNET</text>
  </g>

  <g transform="translate(84 176)">
    <text x="0" y="0" fill="#34d399" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="12" font-weight="600" letter-spacing="0.34em">MEMORY / VERIFIED</text>
    <text x="0" y="96" fill="#e7e9ee" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="72" font-weight="600" letter-spacing="-0.04em">Tamper-evident memory</text>
    <text x="0" y="174" fill="#e7e9ee" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="72" font-weight="600" letter-spacing="-0.04em">for</text>
    <text x="118" y="174" fill="#34d399" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="72" font-weight="600" letter-spacing="-0.04em">autonomous AI agents.</text>
    <text x="0" y="250" fill="#8b91a3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="400">
      Hash-anchor offchain memory logs to Solana and verify whether a
    </text>
    <text x="0" y="282" fill="#8b91a3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="400">
      thought, observation, or decision was rewritten after commit.
    </text>
  </g>

  <g transform="translate(820 118)" filter="url(#soft-glow)">
    <line x1="28" y1="112" x2="408" y2="112" stroke="#34d399" stroke-opacity="0.8" stroke-width="7" stroke-linecap="round" stroke-dasharray="18 14" />

    <line x1="28" y1="112" x2="28" y2="340" stroke="#a78bfa" stroke-opacity="0.55" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 10" />
    <line x1="123" y1="112" x2="123" y2="340" stroke="#a78bfa" stroke-opacity="0.55" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 10" />
    <line x1="218" y1="112" x2="218" y2="340" stroke="#a78bfa" stroke-opacity="0.55" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 10" />
    <line x1="313" y1="112" x2="313" y2="340" stroke="#a78bfa" stroke-opacity="0.55" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 10" />
    <line x1="408" y1="112" x2="408" y2="340" stroke="#a78bfa" stroke-opacity="0.55" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 10" />

    <circle cx="28" cy="112" r="18" fill="#34d399" />
    <circle cx="123" cy="112" r="18" fill="#34d399" />
    <circle cx="218" cy="112" r="18" fill="#34d399" />
    <circle cx="313" cy="112" r="18" fill="#34d399" />
    <circle cx="408" cy="112" r="18" fill="#34d399" />

    <rect x="8" y="340" width="40" height="40" rx="4" fill="#a78bfa" />
    <rect x="103" y="340" width="40" height="40" rx="4" fill="#a78bfa" />
    <rect x="198" y="340" width="40" height="40" rx="4" fill="#a78bfa" />
    <rect x="293" y="340" width="40" height="40" rx="4" fill="#a78bfa" />
    <rect x="388" y="340" width="40" height="40" rx="4" fill="#a78bfa" />
  </g>

  <g transform="translate(84 566)">
    <text x="0" y="0" fill="#8b91a3" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="11" font-weight="500" letter-spacing="0.2em">POSTGRES PAYLOAD / SOLANA HASH / LIVE RECOMPUTE</text>
  </g>
</svg>
